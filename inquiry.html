    <main>
        <div class="page-header">
            <h1>문의</h1>
        </div>

        <section class="section bg-light">
            <div class="container">
                <h2 class="section-title">Contact Us</h2>
                <div class="content-text" style="margin-bottom: 40px;">
                    <p>제품 및 서비스에 대한 문의사항을 남겨주시면 신속하게 답변해 드리겠습니다.</p>
                </div>
                <form class="contact-form" name="inquiry" method="POST" data-netlify="true">
                    <div class="form-group">
                        <label for="name">이름 / 회사명</label>
                        <input type="text" id="name" name="name" required placeholder="이름이나 회사명을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" required placeholder="답변 받으실 이메일을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="6" required placeholder="문의하실 내용을 상세히 적어주세요"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의하기</button>
                </form>
            </div>
        </section>
    </main>
